<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Document</title>
</head>
<body>

    <div class="header">
        <div class="logo">
            <img src="./bolsalogo.png" alt="Logo">
            <h2>MINI STORE</h2>
        </div>

        <div class="nav">
            <a href="#">inicio</a>
            <a href="#">Productos</a>
            <a href="#">Categorías</a>
            <a href="#">Contacto</a>
        </div>
    </div>

    <div class="banner">
        <div class="bannercontent">
            <h1>Bienvenido a MINI STORE</h1>
            <p>Tu tienda online de confianza</p>
            <button>Ver Productos</button>
        </div>
    </div>

    <div class="productos">
        
        <div class="producto1">
            <img src="./audifonos.png" alt="" width="200px">
            <h3>Audífonos</h3>
            <p>$19.99</p>
            <button class="comprar">Comprar</button>
        </div>

        <div class="producto2">
            <img src="./Relog.png" alt="" width="200px">
            <h3>Reloj</h3>
            <p>$29.99</p>
            <button class="comprar">Comprar</button>
        </div>

        <div class="producto3">
            <img src="./mochila.png" alt="" width="200px">
            <h3>Mochila</h3>
            <p>$39.99</p>
            <button class="comprar">Comprar</button>
        </div>

        <div class="producto4">
            <img src="./shoes.png" alt="" width="200px">
            <h3>Calzado</h3>
            <p>$49.99</p>
            <button class="comprar">Comprar</button>
        </div>

        <div class="producto5">
            <img src="./gafas.png" alt="" width="200px">
            <h3>Gafas</h3>
            <p>$59.99</p>
            <button class="comprar">Comprar</button>
        </div>

        <div class="producto6">
            <img src="./speaker.png" alt="" width="200px">
            <h3>Altavoz</h3>
            <p>$69.99</p>
            <button class="comprar">Comprar</button>
        </div>
    </div>
    
    <div class="footer">
        <p>&copy; 2024 MINI STORE. Todos los derechos reservados.</p>
        <h4>Siguenos: </h4>
        <a href="#"><img src="./fb.png" alt="" width="20px"></a>
        <a href="#"><img src="./ig.png" alt="" width="20px"></a>
        <a href="#"><img src="./tw.png" alt="" width="20px"></a>
    </div>
    
</body>
</html>
